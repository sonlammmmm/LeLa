spring:
  datasource:
    url: ${YOEDU_DB_URL:jdbc:ThemSau}
    username: ${YOEDU_DB_USER:root}
    password: ${YOEDU_DB_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    enabled: false
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true